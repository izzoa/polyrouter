name: CI

# Enforces the CLAUDE.md Definition of done on every push and pull request:
# build, lint, typecheck (test files included), unit suites, and the e2e suite
# against real Postgres 16 + Redis 7. See openspec/specs/ci-pipeline.
on:
  push:
  pull_request:

# One in-flight run per ref; a new push cancels the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: build · lint · typecheck · unit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      # Present so the REDIS_URL-gated breaker parity suite EXECUTES here (and
      # fails loudly if it can't) rather than silently skipping.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    env:
      CI: 'true'
      REDIS_URL: redis://127.0.0.1:6379
      # add-semantic-embedder (impl-clink Med-4): the ORT devDependency's
      # postinstall fetches CUDA blobs on linux-x64 — skip it regardless of
      # npm version/allowScripts posture (CPU prebuilts ship in the tarball).
      ONNXRUNTIME_NODE_INSTALL: skip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - name: install.sh re-run idempotency (E13)
        run: sh test/install-rerun.test.sh

  e2e:
    name: e2e (postgres + redis)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        # Credentials match docker-compose.dev.yml so the config defaults connect.
        env:
          POSTGRES_USER: polyrouter
          POSTGRES_PASSWORD: polyrouter
          POSTGRES_DB: polyrouter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polyrouter -d polyrouter"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    env:
      CI: 'true'
      DATABASE_URL: postgresql://polyrouter:polyrouter@127.0.0.1:5432/polyrouter
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # Build the workspace deps once (turbo-cached); both e2e passes reuse it.
      - run: npm run build
      # The Better-Auth ESM e2e suites (auth.e2e, user-admin.e2e) intermittently
      # fail jest's --experimental-vm-modules loader (`undefined … 'identifier'`/
      # `'close'`) under the accumulated module-registry pressure of the full
      # --runInBand run — they pass in their OWN fresh process (the auth stack is
      # also proven by prod-topology booting the real server). The L2 semantic work
      # added ~10 e2e suites, tipping this from intermittent to frequent, so split
      # the run: the 37 stable suites in one jest process, the two flaky auth suites
      # isolated in another. Each pass keeps one fresh-process retry — a genuine
      # failure fails both attempts and still reds the job.
      - name: e2e — all suites except the ESM-flaky auth suites
        run: |
          if ! npm run test:e2e -w packages/control-plane -- --testPathIgnorePatterns '/node_modules/' 'test/auth/'; then
            echo "::warning title=e2e retried::non-auth e2e failed; re-running once on a fresh process"
            npm run test:e2e -w packages/control-plane -- --testPathIgnorePatterns '/node_modules/' 'test/auth/'
          fi
      - name: e2e — auth suites, isolated in their own jest process
        run: |
          if ! npm run test:e2e -w packages/control-plane -- 'test/auth/'; then
            echo "::warning title=e2e retried::auth e2e failed alone; re-running once on a fresh process (documented Better-Auth ESM flake)"
            npm run test:e2e -w packages/control-plane -- 'test/auth/'
          fi

  baseline-image-neutrality:
    # add-semantic-embedder D7: the optional semantic stack must NEVER reach
    # the baseline image — no onnxruntime artifact, no model/vocab files.
    # (An optional PEER dependency is never auto-installed; this proves it.)
    name: baseline image stays ORT- and model-free
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Build the production image (baseline)
        run: docker build -t polyrouter-baseline:ci .
      - name: Assert no ONNX runtime or model artifacts exist in the image
        run: |
          docker run --rm --entrypoint sh polyrouter-baseline:ci -c '
            set -e
            fail=0
            pkgs=$(find /app -type d -name "onnxruntime*" | head -20)
            if [ -n "$pkgs" ]; then echo "FORBIDDEN runtime packages:"; echo "$pkgs"; fail=1; fi
            models=$(find /app -name "*.onnx" -o -name "*.ort" | head -20)
            if [ -n "$models" ]; then echo "FORBIDDEN model files:"; echo "$models"; fail=1; fi
            if [ -d /app/models ]; then echo "FORBIDDEN baked model directory /app/models"; fail=1; fi
            [ "$fail" = 0 ] || exit 1
            echo "baseline image is ORT- and model-free"'
