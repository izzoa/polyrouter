<svg viewBox="0 0 1200 760" width="1200" height="760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="polyrouter dashboard overview: KPI tiles for requests, spend, latency and success rate; a requests-over-time chart; spend by model; and a live request log with per-request routing layer, tokens, snapshot-priced cost and latency.">
  <!-- polyrouter dashboard hero — self-contained (no external fonts/scripts) so it renders
       as a GitHub <img>. Light theme, accent #4F5DFF, per STYLESEED.md. Mirrors the overview
       mockup on polyrouter.app. -->
  <defs>
    <clipPath id="win"><rect x="1" y="1" width="1198" height="758" rx="12"/></clipPath>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f5dff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#4f5dff" stop-opacity="0"/>
    </linearGradient>
    <style>
      text{font-family:'Helvetica Neue','Segoe UI',Arial,sans-serif;fill:#17181a}
      .mono{font-family:ui-monospace,'SF Mono','Menlo','Consolas',monospace}
      .t3{fill:#6a6c73}.t2{fill:#55575e}.fa{fill:#b4b6bc}.wht{fill:#ffffff}
      .grn{fill:#3bb273}.amb{fill:#c8901a}.acc{fill:#4f5dff}.dp{fill:#3f47c9}
      .lbl{font-size:12px;fill:#6a6c73}
      .sub{font-size:11.5px;fill:#6a6c73}
      .kpi{font-size:25px;font-weight:600;letter-spacing:-0.6px}
      .st{font-size:13px;font-weight:500;fill:#17181a}
    </style>
  </defs>

  <g clip-path="url(#win)">
    <!-- surfaces -->
    <rect x="1" y="1" width="1198" height="758" fill="#ffffff"/>
    <rect x="1" y="47" width="212" height="712" fill="#f7f7f5"/>

    <!-- window bar -->
