    <circle cx="44" cy="24" r="5.5" fill="#d6d6d3"/>
    <circle cx="64" cy="24" r="5.5" fill="#d6d6d3"/>
    <rect x="470" y="12" width="260" height="24" rx="6" fill="#f4f4f2" stroke="#ececea"/>
    <text x="600" y="28.5" text-anchor="middle" class="mono t3" font-size="11.5">app.polyrouter.app/overview</text>
    <line x1="1" y1="47" x2="1199" y2="47" stroke="#ececea"/>
    <line x1="213" y1="47" x2="213" y2="759" stroke="#ececea"/>

