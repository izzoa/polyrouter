      <line x1="21" y1="44" x2="58" y2="44" stroke="#ececea" stroke-width="6" stroke-linecap="round"/>
      <line x1="20" y1="44" x2="60" y2="66" stroke="#ececea" stroke-width="6" stroke-linecap="round"/>
      <circle cx="15" cy="44" r="10.5" fill="#17181a"/>
      <circle cx="66" cy="20" r="10.5" fill="#4f5dff"/>
      <circle cx="66" cy="44" r="10.5" fill="#b4b6bc"/>
