  <line x1="21" y1="44" x2="58" y2="44" stroke="#26272d" stroke-width="6" stroke-linecap="round"/>
  <line x1="20" y1="44" x2="60" y2="66" stroke="#26272d" stroke-width="6" stroke-linecap="round"/>
  <circle cx="15" cy="44" r="10.5" fill="#f0f1f4"/>
  <circle cx="66" cy="20" r="10.5" fill="#4F5DFF"/>
  <circle cx="66" cy="44" r="10.5" fill="#4e5058"/>
  <circle cx="66" cy="68" r="10.5" fill="#4e5058"/>
  <text x="100" y="59" font-family="Geist, -apple-system, 'Segoe UI', system-ui, sans-serif" font-size="42" font-weight="600" letter-spacing="-1.2" fill="#f0f1f4">polyrouter</text>
</svg>
