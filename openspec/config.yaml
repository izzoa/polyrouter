schema: spec-driven

# Project context — shown to AI when creating artifacts.
context: |
  App name: polyrouter — a self-hostable open-source LLM router/gateway
  (one OpenAI- and Anthropic-compatible endpoint; explicit-first routing,
  fallbacks, spend limits, metadata-only cost recording).

  Sources of truth: spec.md (full reference spec; wins on any detail),
  CLAUDE.md (pinned stack + 12 non-negotiable invariants + build order),
  TODOS.md (the change breakdown and per-change workflow), openspec/project.md.

  Stack (pinned): TypeScript strict, Node 24.x LTS, NestJS 11, Drizzle (NOT
  TypeORM), PostgreSQL 16, Redis, Better Auth, SolidJS + Vite + uPlot,
  Turborepo + npm workspaces, Docker single-container.

  Branding: never reuse Manifest branding from spec examples. Agent key
  prefix is poly_ (not mnfst_), tier header is x-polyrouter-tier (not
  x-manifest-tier), product strings say polyrouter.

# Per-artifact rules.
rules:
  proposal:
    - State which TODOS.md entry and spec.md sections the change implements
    - Include a Non-goals section guarding against scope creep into later changes
  specs:
    - Express definition-of-done as WHEN/THEN scenarios lifted from spec.md §15
      acceptance criteria and the matching build milestone
  tasks:
    - Order tasks so tests (contract/SSRF/tenant-isolation/cost-immutability
      where relevant) land with the code they cover, not at the end
